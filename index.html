function Particle({ source, index, radius, centerX, centerY }) {
  const [pos, setPos] = useState({ x: 0, y: 0, opacity: 0 });
  const animRef = useRef(null);
  const startTime = useRef(null);
  const dur = 2200 + Math.random() * 1200;
  const del = index * 380 + Math.random() * 600;
  const ar = (source.angle * Math.PI) / 180;
  const sx = centerX + Math.cos(ar) * radius, sy = centerY + Math.sin(ar) * radius;
  const oa = (Math.random() - 0.5) * 0.4;
  useEffect(() => {
    let to;
    const anim = (ts) => {
      if (!startTime.current) startTime.current = ts;
      const p = Math.min((ts - startTime.current) / dur, 1);
      const e = 1 - Math.pow(1 - p, 3);
      const mx = (sx + centerX) / 2 + Math.sin(oa) * 40, my = (sy + centerY) / 2 + Math.cos(oa) * 40;
      const x = (1-e)*(1-e)*sx + 2*(1-e)*e*mx + e*e*centerX;
      const y = (1-e)*(1-e)*sy + 2*(1-e)*e*my + e*e*centerY;
      let op = p < 0.15 ? p/0.15 : p > 0.85 ? (1-p)/0.15 : 1;
      setPos({ x, y, opacity: op });
      if (p < 1) animRef.current = requestAnimationFrame(anim);
      else { startTime.current = null; to = setTimeout(() => { animRef.current = requestAnimationFrame(anim); }, del); }
    };
    to = setTimeout(() => { animRef.current = requestAnimationFrame(anim); }, del);
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); clearTimeout(to); };
  }, []);
  return <div style={{ position: "absolute", left: pos.x-3, top: pos.y-3, width: 6, height: 6, borderRadius: "50%", background: source.color, boxShadow: `0 0 8px ${source.color}, 0 0 16px ${source.color}50`, opacity: pos.opacity, pointerEvents: "none", zIndex: 5 }} />;
}

function SourceNode({ source, label, sublabel, radius, centerX, centerY, isActive, onClick, phase, idx }) {
  const ar = (source.angle * Math.PI) / 180;
  const x = centerX + Math.cos(ar) * radius, y = centerY + Math.sin(ar) * radius;
  return (
    <>
      <line x1={x} y1={y} x2={centerX} y2={centerY} stroke={`${source.color}18`} strokeWidth="1" strokeDasharray="4 6" style={{ opacity: phase>=1?1:0, transition: "opacity 0.8s ease" }} />
      <foreignObject x={x-40} y={y-40} width={80} height={80} style={{ opacity: phase>=1?1:0, transform: phase>=1?"scale(1)":"scale(0.5)", transition: `all 0.6s cubic-bezier(0.34,1.56,0.64,1) ${idx*0.1}s`, transformOrigin: "center", cursor: "pointer" }}>
        <div onClick={() => onClick(source.id)} style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: isActive ? `${source.color}20` : "rgba(14,26,11,0.85)", border: `1.5px solid ${isActive ? source.color : source.color+"40"}`, borderRadius: "16px", backdropFilter: "blur(8px)", transition: "all 0.3s ease", padding: "4px" }}>

          <span style={{ fontSize: "9px", fontWeight: 700, color: "#fff", marginTop: "4px", textAlign: "center", letterSpacing: "0.02em", lineHeight: 1.2, fontFamily: "'DM Sans',sans-serif" }}>{label}</span>

}

function PipelineParticle({ startX, startY, endX, endY, color, delayMs }) {
  const [pos, setPos] = useState({ x: startX, y: startY, opacity: 0 });
  const animRef = useRef(null); const startTime = useRef(null);
  useEffect(() => {
    let to;
    const anim = (ts) => {
      if (!startTime.current) startTime.current = ts;
      const p = Math.min((ts-startTime.current)/1800,1);
      const e = 1-Math.pow(1-p,3);
      setPos({ x: startX+(endX-startX)*e, y: startY+(endY-startY)*e, opacity: p<0.1?p/0.1:p>0.9?(1-p)/0.1:1 });
      if (p<1) animRef.current = requestAnimationFrame(anim);
      else { startTime.current = null; to = setTimeout(() => { animRef.current = requestAnimationFrame(anim); }, 800+Math.random()*400); }
    };
    to = setTimeout(() => { animRef.current = requestAnimationFrame(anim); }, delayMs);
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); clearTimeout(to); };
  }, []);
  return <div style={{ position: "absolute", left: pos.x-3, top: pos.y-3, width: 6, height: 6, borderRadius: "50%", background: color, boxShadow: `0 0 8px ${color}, 0 0 14px ${color}50`, opacity: pos.opacity, pointerEvents: "none", zIndex: 5 }} />;
}

            <span style={{ fontSize:"10px", fontWeight:900, color:SKODA_GREEN, letterSpacing:"0.1em", textTransform:"uppercase" }}>ŠKODA X</span>
            <span style={{ fontSize:"8px", fontWeight:700, color:"rgba(255,255,255,0.7)", marginTop:"1px", letterSpacing:"0.08em" }}>DATA HUB</span>
            <span style={{ fontSize:"11px", fontWeight:900, color:SKODA_LIGHT, marginTop:"4px", fontFamily:"'Space Mono',monospace", letterSpacing:"0.02em", opacity:phase>=2?1:0, transition:"opacity 0.6s", textShadow:`0 0 8px ${SKODA_GREEN}60` }}>{counter.toLocaleString("cs-CZ")}</span>
          </div>
          <div style={{ position:"absolute", left:cx-75, top:cy+80, width:150, textAlign:"center", zIndex:15, opacity:phase>=3?1:0, transform:phase>=3?"translateY(0)":"translateY(10px)", transition:"all 0.6s" }}>
            <div style={{ display:"inline-flex", alignItems:"center", gap:"6px", background:"rgba(75,168,46,0.12)", border:`1px solid ${SKODA_GREEN}30`, borderRadius:"20px", padding:"5px 12px", backdropFilter:"blur(8px)" }}>
              <span style={{ fontSize:"14px" }}>{INSIGHT_ICONS[insightIndex]}</span>
              <span style={{ fontSize:"10px", fontWeight:700, color:SKODA_LIGHT, whiteSpace:"nowrap" }}>{t.insights[insightIndex]}</span>
            </div>
          </div>
        </div>

        <div style={{ display:"flex", gap:mob?"12px":"24px", marginTop:"8px", opacity:phase>=3?1:0, transform:phase>=3?"translateY(0)":"translateY(20px)", transition:"all 0.8s ease 0.3s", flexWrap:"wrap", justifyContent:"center", padding:"0 12px" }}>
          {[{v:"10",l:t.statSources},{v:"1",l:t.statHub},{v:"360°",l:t.statView},{v:"Real-time",l:t.statAnalytics}].map((s,i) => (
            <div key={i} style={{ textAlign:"center", padding:mob?"8px 12px":"10px 16px", background:"rgba(255,255,255,0.03)", borderRadius:"12px", border:"1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ fontSize:mob?"14px":"18px", fontWeight:900, color:SKODA_GREEN, fontFamily:"'Space Mono',monospace" }}>{s.v}</div>
              <div style={{ fontSize:"9px", color:"rgba(255,255,255,0.4)", fontWeight:600, letterSpacing:"0.05em" }}>{s.l}</div>
            </div>
          ))}
        </div>
        <button onClick={goStep2} style={{ marginTop:"24px", padding:mob?"12px 24px":"14px 36px", background:phase>=3?`linear-gradient(135deg,${SKODA_GREEN},${SKODA_LIGHT})`:"rgba(255,255,255,0.05)", border:"none", borderRadius:"12px", cursor:phase>=3?"pointer":"default", color:"#fff", fontSize:mob?"12px":"14px", fontWeight:700, fontFamily:"'DM Sans',sans-serif", letterSpacing:"0.03em", opacity:phase>=3?1:0, transform:phase>=3?"translateY(0)":"translateY(10px)", transition:"all 0.6s ease 0.5s", animation:phase>=3?"btnGlow 2s ease-in-out infinite":"none" }}>{t.btnContinue}</button>
      </div>

      {/* ══════ STEP 2 ══════ */}
      {step===2 && (
        <div ref={step2Ref} style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-start", padding:mob?"32px 12px":"48px 20px", background:`radial-gradient(ellipse at 50% 20%,#0f1f2e80 0%,${SKODA_DARK} 70%)` }}>
          <div style={{ textAlign:"center", marginBottom:mob?"20px":"36px", animation:"fadeSlideUp 0.8s ease forwards", padding:"0 12px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:"12px", marginBottom:"12px" }}>
              <StepDot n={1} active={false} onClick={goStart} /><StepLine active /><StepDot n={2} active /><StepLine active={visibleCards>=6} /><StepDot n={3} active={visibleCards>=6} />
            </div>
            <h2 style={{ fontSize:mob?"20px":"28px", fontWeight:900, color:"#fff", margin:0, letterSpacing:"-0.02em" }}>{t.h2ai}<span style={{ color:SKODA_GREEN }}>{t.h2aiB}</span></h2>
            <p style={{ fontSize:mob?"11px":"13px", color:"rgba(255,255,255,0.4)", marginTop:"6px", fontWeight:500 }}>{t.step2sub}</p>
          </div>

          <div className="scroll-hide" style={{ display:"flex", alignItems:"center", gap:"4px", marginBottom:mob?"24px":"40px", opacity:aiPhase>=1?1:0, transform:aiPhase>=1?"translateY(0)":"translateY(16px)", transition:"all 0.8s", overflowX:"auto", maxWidth:"100%", padding:mob?"0 8px":"0", WebkitOverflowScrolling:"touch" }}>
            {PIPE_ICONS.map((ic,i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:"4px", flexShrink:0 }}>
                <div style={{ padding:mob?"8px 10px":"10px 16px", borderRadius:"12px", background:activePipeline===i?`${SKODA_GREEN}18`:"rgba(255,255,255,0.03)", border:`1.5px solid ${activePipeline===i?SKODA_GREEN:"rgba(255,255,255,0.08)"}`, textAlign:"center", transition:"all 0.4s", boxShadow:activePipeline===i?`0 0 20px ${SKODA_GREEN}15`:"none", position:"relative", overflow:"hidden" }}>
                  {activePipeline===i && <div style={{ position:"absolute", left:0, width:"100%", height:"2px", background:`linear-gradient(90deg,transparent,${SKODA_GREEN},transparent)`, animation:"scanline 1.5s linear infinite" }} />}
                  <div style={{ fontSize:"18px", marginBottom:"4px" }}>{ic}</div>
                  <div style={{ fontSize:"9px", fontWeight:700, color:activePipeline===i?"#fff":"rgba(255,255,255,0.6)", whiteSpace:"nowrap" }}>{t.pipeline[i][0]}</div>
                  <div style={{ fontSize:"7px", color:"rgba(255,255,255,0.3)", marginTop:"2px" }}>{t.pipeline[i][1]}</div>
                </div>
                {i<4 && <div style={{ color:activePipeline>i?SKODA_GREEN:"rgba(255,255,255,0.15)", fontSize:"14px", fontWeight:700, transition:"color 0.4s" }}>→</div>}
              </div>
            ))}
          </div>

          {(() => {
            const bW = 660, bH = 480;
            const bScale = Math.min(1, (winW - 24) / bW);
            return (
          <div style={{ position:"relative", width:bW, height:bH, transform:`scale(${bScale})`, transformOrigin:"top center", marginBottom: bScale < 1 ? `${-(bH * (1 - bScale))}px` : 0 }}>
            <div style={{ position:"absolute", left:"50%", top:20, transform:"translateX(-50%)", width:120, height:120, borderRadius:"50%", background:`radial-gradient(circle at 35% 35%,#1a2a3a,${SKODA_DARK})`, border:`2px solid ${SKODA_GREEN}50`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", boxShadow:`0 0 50px ${SKODA_GREEN}20, inset 0 0 30px rgba(75,168,46,0.08)`, zIndex:10, opacity:aiPhase>=1?1:0, transform:`translateX(-50%) scale(${aiPhase>=1?1:0.5})`, transition:"all 0.8s cubic-bezier(0.34,1.56,0.64,1)" }}>
              {aiPhase>=2 && <div style={{ position:"absolute", inset:-4, borderRadius:"50%", border:`2px solid ${SKODA_GREEN}40`, animation:"pulseRing 2s ease-out infinite" }} />}
              <div style={{ fontSize:"32px", marginBottom:"2px" }}>🧠</div>
              <span style={{ fontSize:"9px", fontWeight:900, color:SKODA_GREEN, letterSpacing:"0.1em" }}>AI ENGINE</span>
              <span style={{ fontSize:"7px", color:"rgba(255,255,255,0.5)", marginTop:"1px" }}>Škoda X</span>
            </div>
            <div style={{ position:"absolute", left:"50%", top:140, width:2, height:50, background:`linear-gradient(to bottom,${SKODA_GREEN}40,${SKODA_GREEN}10)`, transform:"translateX(-50%)", opacity:aiPhase>=2?1:0, transition:"opacity 0.6s" }} />
            <div style={{ position:"absolute", left:"50%", top:185, transform:"translateX(-50%)", fontSize:"16px", color:SKODA_GREEN, opacity:aiPhase>=2?1:0, transition:"opacity 0.6s ease 0.2s" }}>▼</div>

            <div style={{ position:"absolute", top:210, left:0, right:0, display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"12px", padding:"0 10px" }}>
              {AO_META.map((ao,i) => (
                <div key={ao.id} style={{ padding:"16px", borderRadius:"14px", background:"rgba(255,255,255,0.025)", border:`1px solid ${visibleCards>i?ao.color+"30":"rgba(255,255,255,0.05)"}`, opacity:visibleCards>i?1:0, transform:visibleCards>i?"translateY(0) scale(1)":"translateY(20px) scale(0.95)", transition:"all 0.5s cubic-bezier(0.34,1.56,0.64,1)", position:"relative", overflow:"hidden" }}>
                  {visibleCards>i && <div style={{ position:"absolute", top:0, left:0, height:"2px", width:`${AO_WIDTHS[i]}%`, background:`linear-gradient(90deg,${ao.color}80,transparent)`, borderRadius:"2px" }} />}
                  <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"6px" }}>
                    <span style={{ fontSize:"20px" }}>{ao.icon}</span>
                    <span style={{ fontSize:"11px", fontWeight:700, color:"#fff" }}>{t.aiOutputs[i][0]}</span>
                  </div>
                  <span style={{ fontSize:"9px", color:"rgba(255,255,255,0.4)", lineHeight:1.4 }}>{t.aiOutputs[i][1]}</span>
                  {visibleCards>i && <div style={{ marginTop:"8px", display:"flex", gap:"3px", alignItems:"flex-end", height:"20px" }}>{AO_BARS[i].map((h,j) => <div key={j} style={{ width:"100%", borderRadius:"2px", height:`${h}%`, background:`${ao.color}${j%2===0?"40":"25"}` }} />)}</div>}
                </div>
              ))}
            </div>
            {visibleCards>0 && AO_META.slice(0,visibleCards).map((ao,i) => <PipelineParticle key={`p-${ao.id}`} startX={330} startY={140} endX={110+(i%3)*220} endY={260} color={ao.color} delayMs={200} />)}
          </div>
            );
          })()}

          <div style={{ marginTop:"32px", textAlign:"center", opacity:visibleCards>=6?1:0, transform:visibleCards>=6?"translateY(0)":"translateY(16px)", transition:"all 0.8s", padding:"0 12px" }}>
            <div style={{ display:"inline-flex", alignItems:"center", gap:"10px", padding:mob?"10px 16px":"12px 24px", borderRadius:"14px", background:`linear-gradient(135deg,${SKODA_GREEN}10,${SKODA_GREEN}05)`, border:`1px solid ${SKODA_GREEN}25` }}>
              <span style={{ fontSize:"18px" }}>✨</span>
              <span style={{ fontSize:mob?"10px":"12px", fontWeight:700, color:"#fff" }}>{t.summary} <span style={{ color:SKODA_GREEN }}>{t.summaryEnd}</span></span>
            </div>
          </div>
          <button onClick={goStep3} style={{ marginTop:"24px", padding:"14px 36px", background:visibleCards>=6?`linear-gradient(135deg,${SKODA_GREEN},${SKODA_LIGHT})`:"rgba(255,255,255,0.05)", border:"none", borderRadius:"12px", cursor:visibleCards>=6?"pointer":"default", color:"#fff", fontSize:"14px", fontWeight:700, fontFamily:"'DM Sans',sans-serif", letterSpacing:"0.03em", opacity:visibleCards>=6?1:0, transform:visibleCards>=6?"translateY(0)":"translateY(10px)", transition:"all 0.6s ease 0.3s", animation:visibleCards>=6?"btnGlow 2s ease-in-out infinite":"none" }}>{t.btnRec}</button>
          <button onClick={goStart} style={{ marginTop:"12px", padding:"10px 24px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"10px", cursor:"pointer", color:"rgba(255,255,255,0.5)", fontSize:"12px", fontWeight:600, fontFamily:"'DM Sans',sans-serif", opacity:visibleCards>=6?1:0, transition:"opacity 0.4s ease 0.5s" }}>{t.btnBack1}</button>
        </div>
      )}

      {/* ══════ STEP 3 ══════ */}
      {step===3 && (
        <div ref={step3Ref} style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-start", padding:mob?"32px 12px":"48px 20px", background:`radial-gradient(ellipse at 50% 30%,#1a0f2e40 0%,${SKODA_DARK} 70%)` }}>
          <div style={{ textAlign:"center", marginBottom:mob?"20px":"32px", animation:"fadeSlideUp 0.8s ease forwards", padding:"0 12px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:"12px", marginBottom:"12px" }}>
              <StepDot n={1} active={false} onClick={goStart} /><StepLine active /><StepDot n={2} active={false} onClick={goBackTo2} /><StepLine active /><StepDot n={3} active />
            </div>
            <h2 style={{ fontSize:mob?"20px":"28px", fontWeight:900, color:"#fff", margin:0, letterSpacing:"-0.02em" }}>{t.h2rec}<span style={{ color:SKODA_GREEN }}>{t.h2recB}</span></h2>
            <p style={{ fontSize:mob?"11px":"13px", color:"rgba(255,255,255,0.4)", marginTop:"6px", fontWeight:500 }}>{t.step3sub}</p>
          </div>

          {/* Category tabs */}
          <div style={{ display:"flex", gap:"8px", marginBottom:mob?"16px":"24px", opacity:recPhase>=1?1:0, transform:recPhase>=1?"translateY(0)":"translateY(16px)", transition:"all 0.6s", flexWrap:"wrap", justifyContent:"center" }}>
            {CAT_META.map((cm,i) => (
              <button key={i} onClick={() => { setActiveCategory(i); setActiveModel(0); setVisibleRecs(0); setRecPhase(2); }} style={{ padding:mob?"10px 16px":"12px 24px", borderRadius:"14px", background:activeCategory===i?`${cm.color}18`:"rgba(255,255,255,0.03)", border:`1.5px solid ${activeCategory===i?cm.color:"rgba(255,255,255,0.08)"}`, cursor:"pointer", display:"flex", alignItems:"center", gap:"8px", transition:"all 0.3s", boxShadow:activeCategory===i?`0 0 20px ${cm.color}15`:"none" }}>
                <span style={{ fontSize:"20px" }}>{cm.icon}</span>
                <div style={{ textAlign:"left" }}>
                  <div style={{ fontSize:"12px", fontWeight:700, color:activeCategory===i?"#fff":"rgba(255,255,255,0.5)" }}>{t.cats[i]}</div>
                  <div style={{ fontSize:"9px", color:"rgba(255,255,255,0.3)" }}>
                    {(i===0 ? models.reduce((s,m)=>s+m.priorities.length,0) : i===1 ? SALES_META.priorities.length : AS_META.priorities.length)} {t.recCount}
                  </div>
                </div>
              </button>
            ))}
          </div>

          {/* Market selector */}
          <div style={{ display:"flex", alignItems:"center", gap:mob?"6px":"8px", marginBottom:"20px", opacity:recPhase>=1?1:0, transform:recPhase>=1?"translateY(0)":"translateY(12px)", transition:"all 0.5s ease 0.1s", flexWrap:"wrap", justifyContent:"center" }}>
            <span style={{ fontSize:"10px", fontWeight:700, color:"rgba(255,255,255,0.3)", letterSpacing:"0.1em", textTransform:"uppercase", marginRight:"4px", width:mob?"100%":"auto", textAlign:mob?"center":"left" }}>{t.marketLabel}:</span>
            {MARKETS.map((mk,i) => (
              <button key={mk.id} onClick={() => { setActiveMarket(i); setActiveModel(0); setVisibleRecs(0); }} style={{
                padding: "6px 12px", borderRadius: "8px",
                background: activeMarket===i ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.02)",
                border: `1px solid ${activeMarket===i ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.06)"}`,
                cursor: "pointer", display: "flex", alignItems: "center", gap: "5px",
                transition: "all 0.3s ease",
              }}>
                <span style={{ fontSize:"14px" }}>{mk.flag}</span>
                <span style={{ fontSize:"10px", fontWeight:700, color: activeMarket===i ? "#fff" : "rgba(255,255,255,0.35)" }}>{mk.name[lang]}</span>
              </button>
            ))}
          </div>

          {/* Model sub-tabs */}
          {activeCategory===0 && (
            <div style={{ display:"flex", gap:"6px", marginBottom:"24px", flexWrap:"wrap", justifyContent:"center", opacity:recPhase>=1?1:0, transform:recPhase>=1?"translateY(0)":"translateY(10px)", transition:"all 0.5s ease 0.15s" }}>
              {models.map((m,i) => (
                <button key={m.key} onClick={() => { setActiveModel(i); setVisibleRecs(0); setTimeout(()=>setRecPhase(2),50); }} style={{ padding:"8px 16px", borderRadius:"10px", background:activeModel===i?"rgba(75,168,46,0.12)":"rgba(255,255,255,0.02)", border:`1px solid ${activeModel===i?SKODA_GREEN+"50":"rgba(255,255,255,0.06)"}`, cursor:"pointer", display:"flex", alignItems:"center", gap:"6px", transition:"all 0.3s" }}>
                  <span style={{ fontSize:"14px" }}>{m.icon}</span>
                  <span style={{ fontSize:"11px", fontWeight:700, color:activeModel===i?"#fff":"rgba(255,255,255,0.4)" }}>{m.name}</span>
                  <span style={{ fontSize:"8px", fontWeight:700, padding:"2px 6px", borderRadius:"6px", background:activeModel===i?SKODA_GREEN+"20":"rgba(255,255,255,0.05)", color:activeModel===i?SKODA_GREEN:"rgba(255,255,255,0.25)" }}>{m.priorities.length}</span>
                </button>
              ))}
            </div>
          )}

          {/* Rec cards */}
          <div style={{ width:"100%", maxWidth:680, display:"flex", flexDirection:"column", gap:mob?"12px":"16px", padding:mob?"0 4px":"0" }}>
            {getRecItems().map((rec,idx) => {
              const cc = CAT_META[activeCategory].color;
              const pc = PRIO_META[rec.priority] || PRIO_META.MEDIUM;
              const vis = visibleRecs > idx;
              return (
                <div key={`${activeCategory}-${activeModel}-${idx}`} style={{ padding:mob?"16px":"24px", borderRadius:mob?"12px":"16px", background:"rgba(255,255,255,0.025)", border:`1px solid ${vis?cc+"25":"rgba(255,255,255,0.05)"}`, opacity:vis?1:0, transform:vis?"translateY(0) scale(1)":"translateY(24px) scale(0.97)", transition:"all 0.6s cubic-bezier(0.34,1.56,0.64,1)", position:"relative", overflow:"hidden" }}>
                  {vis && <div style={{ position:"absolute", top:0, left:0, right:0, height:"2px", background:`linear-gradient(90deg,${pc.color}80,${pc.color}20,transparent)` }} />}
                  <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:"10px" }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"6px", flexWrap:"wrap" }}>
                        <span style={{ fontSize:mob?"14px":"16px", fontWeight:900, color:"#fff", letterSpacing:"-0.01em" }}>{rec.title}</span>
                      </div>
                      <p style={{ fontSize:"12px", color:"rgba(255,255,255,0.5)", lineHeight:1.5, margin:0 }}>{rec.desc}</p>
                    </div>
                    <div style={{ width:mob?44:56, height:mob?44:56, borderRadius:"50%", flexShrink:0, marginLeft:mob?"10px":"16px", background:`conic-gradient(${pc.color} ${rec.impact}%, rgba(255,255,255,0.06) ${rec.impact}%)`, display:"flex", alignItems:"center", justifyContent:"center" }}>
                      <div style={{ width:mob?34:44, height:mob?34:44, borderRadius:"50%", background:SKODA_DARK, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
                        <span style={{ fontSize:mob?"11px":"14px", fontWeight:900, color:pc.color, fontFamily:"'Space Mono',monospace" }}>{rec.impact}</span>
                        <span style={{ fontSize:mob?"5px":"6px", color:pc.color, fontWeight:700, letterSpacing:"0.05em", opacity:0.7 }}>{pc.label[lang]}</span>
                      </div>
                    </div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"12px", flexWrap:"wrap" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:"5px", padding:"4px 10px", borderRadius:"8px", background:`${cc}10`, border:`1px solid ${cc}20` }}>
                      <span style={{ fontSize:"12px" }}>👥</span>
                      <span style={{ fontSize:"12px", fontWeight:900, color:cc, fontFamily:"'Space Mono',monospace" }}>{rec.mentions.toLocaleString("cs-CZ")}</span>
                      <span style={{ fontSize:"8px", color:"rgba(255,255,255,0.35)", fontWeight:600 }}>{t.mentions}</span>
                    </div>
                    {rec.sources.map(s => <span key={s} style={{ fontSize:"8px", fontWeight:700, padding:"3px 8px", borderRadius:"8px", background:"rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.4)", border:"1px solid rgba(255,255,255,0.08)" }}>📊 {s}</span>)}
                  </div>
                  <div style={{ padding:"10px 14px", borderRadius:"10px", background:`${cc}08`, border:`1px solid ${cc}15`, display:"flex", alignItems:"center", gap:"8px" }}>
                    <span style={{ fontSize:"14px" }}>⚡</span>
                    <div>
                      <span style={{ fontSize:"8px", fontWeight:800, color:cc, letterSpacing:"0.1em", textTransform:"uppercase" }}>{t.recAction}</span>
                      <p style={{ fontSize:"11px", color:"rgba(255,255,255,0.7)", margin:"2px 0 0", lineHeight:1.4 }}>{rec.action}</p>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {(() => {
            const items = getRecItems();
            const allVis = visibleRecs >= items.length;
            return (
              <>
                <div style={{ marginTop:"32px", textAlign:"center", opacity:allVis?1:0, transform:allVis?"translateY(0)":"translateY(16px)", transition:"all 0.8s", padding:"0 12px" }}>
                  <div style={{ display:"inline-flex", alignItems:"center", gap:"10px", padding:mob?"10px 16px":"14px 28px", borderRadius:"14px", background:`linear-gradient(135deg,${SKODA_GREEN}10,${SKODA_GREEN}05)`, border:`1px solid ${SKODA_GREEN}25` }}>
                    <span style={{ fontSize:"18px" }}>🎯</span>
                    <span style={{ fontSize:mob?"10px":"12px", fontWeight:700, color:"#fff" }}>{totalRecs} {t.recSummaryA} {CAT_META.length} {t.recSummaryB} <span style={{ color:SKODA_GREEN }}>{t.recSummaryEnd}</span></span>
                  </div>
                </div>
                <div style={{ display:"flex", gap:"12px", marginTop:"20px", opacity:allVis?1:0, transition:"opacity 0.4s ease 0.3s", flexWrap:"wrap", justifyContent:"center" }}>
                  <button onClick={goBackTo2} style={{ padding:"10px 24px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"10px", cursor:"pointer", color:"rgba(255,255,255,0.5)", fontSize:"12px", fontWeight:600, fontFamily:"'DM Sans',sans-serif" }}>{t.btnBack2}</button>
                  <button onClick={goStart} style={{ padding:"10px 24px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"10px", cursor:"pointer", color:"rgba(255,255,255,0.5)", fontSize:"12px", fontWeight:600, fontFamily:"'DM Sans',sans-serif" }}>{t.btnStart}</button>
                </div>
              </>
            );
          })()}
        </div>
      )}
      </div>{/* end blur wrapper */}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(CustomerDataHub));
  </script>
</body>
</html>
